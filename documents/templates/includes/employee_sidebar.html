{% load static %}
<div class="aside-inner">
    <nav class="sidebar" data-sidebar-anyclick-close="">
        <ul class="sidebar-nav">
            <li class="has-user-block">
                <div class="collapse show" id="user-block">
                    <div class="item user-block">
                        <div class="user-block-picture">
                            <div class="user-block-status">
                                <img class="img-thumbnail rounded-circle" src="{% if user.userprofile.profile_picture %}{{ user.userprofile.profile_picture.url }}{% else %}{% static 'assets/img/dummy.png' %}{% endif %}" alt="Avatar" width="60" height="60">
                                <div class="circle bg-success circle-lg"></div>
                            </div>
                        </div>
                        <div class="user-block-info">
                            <span class="user-block-name">{{ user.get_full_name|default:user.username }}</span>
                            <span class="user-block-role">Employee</span>
                        </div>
                    </div>
                </div>
            </li>
            <li class="nav-heading"><span>User Navigation</span></li>
            <li class="active">
                <a href="#" title="My Dashboard">
                    <em class="icon-home"></em>
                    <span>Home</span>
                </a>
            </li>
            <li>
                <a href="#" title="My Memos">
                    <em class="icon-envelope-letter"></em>
                    <span class="badge badge-danger float-right">new</span>
                    <span>Inbox Memos</span>
                </a>
            </li>
            <li>
                <a href="#" title="Archive">
                    <em class="icon-folder-alt"></em>
                    <span>Memo Archive</span>
                </a>
            </li>
            <li class="nav-heading"><span>Account</span></li>
            <li><a href="#" title="Profile"><em class="icon-user"></em><span>My Profile</span></a></li>
            <li><a href="{% url 'logout' %}"><em class="icon-logout"></em><span>Logout</span></a></li>
        </ul>
    </nav>
</div>
