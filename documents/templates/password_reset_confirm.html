{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Set New Password | DepEd DMS</title>
    <link rel="icon" type="image/png" href="{% static 'img/divisionlogo.png' %}">

    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --brand-primary: #0284c7;
            --brand-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
        }

        * {
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: #ffffff;
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Left Side */
        .brand-section {
            flex: 1.2;
            background: var(--brand-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .brand-content {
            z-index: 11;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .curve-divider {
            position: absolute;
            top: 0;
            right: -1px;
            height: 100%;
            width: 180px;
            z-index: 10;
            fill: #ffffff;
        }

        .brand-logo-main {
            width: 420px;
            max-width: 85%;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.05));
        }

        .brand-title {
            font-size: 2.7rem;
            font-weight: 800;
            color: #0369a1;
            margin-top: 25px;
            line-height: 1.2;
        }

        /* Right Side */
        .form-section {
            width: 550px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
        }

        .login-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 5;
        }

        .form-content-area {
            width: 100%;
            max-width: 380px;
            text-align: center;
            margin-top: -10px;
        }

        .deped-seal-large {
            width: 100px;
            margin-bottom: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative; /* Base para sa positioning ng eye */
        }

        .form-group label {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
            border: 1.5px solid #cbd5e1;
            background: #fcfdfe;
            padding: 0 45px 0 15px; /* Space sa kanan para sa icon */
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--brand-primary);
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        /* FIXED: Eye Icon Centering */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 41px; /* Tantiya base sa label height */
            cursor: pointer;
            color: #64748b;
            transition: color 0.2s;
            z-index: 10;
            font-size: 1.1rem;
            height: 50px; /* Kapareho ng input height */
            display: flex;
            align-items: center; /* Vertical alignment sa loob ng flex container */
        }

        .password-toggle:hover {
            color: var(--brand-primary);
        }

        .btn-login {
            height: 54px;
            border-radius: 10px;
            font-weight: 800;
            background: var(--brand-primary);
            border: none;
            color: white;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #0369a1;
            transform: translateY(-1px);
        }

        /* Waves Animation */
        .wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: -150px;
            left: -50%;
            width: 200%;
            height: 500px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 43%;
            animation: drift 15s infinite linear;
        }

        .wave.-two { animation: drift 12s infinite linear; opacity: 0.15; background: #fff; }
        .wave.-three { animation: drift 19s infinite linear; opacity: 0.1; background: var(--brand-primary); }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1100px) {
            .brand-section { display: none; }
            .form-section { width: 100%; }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="brand-section">
            <div class="wave-container">
                <div class="wave"></div>
                <div class="wave -two"></div>
                <div class="wave -three"></div>
            </div>
            <svg class="curve-divider" preserveAspectRatio="none" viewBox="0 0 100 100">
                <path d="M100 0 C 45 0, 45 50, 100 100 L 100 0 Z" />
            </svg>
              <div class="brand-content">
                <img src="{% static 'img/depedlogo.png' %}" class="brand-logo-main" alt="DepEd Logo">
                <h1 class="brand-title">Systematic Memorandum Automation <br>& Reporting Services</h1>
                <p class="brand-tagline">Division of Catanduanes: Streamlining memorandum tracking for faster
                    administration.</p>
            </div>
        </div>

        <div class="form-section">
            <div class="login-content-wrapper">
                <div class="form-content-area">
                    <img src="{% static 'img/divisionlogo.png' %}" class="deped-seal-large">
                    <h2 class="fw-bolder mb-1" style="color: #1e293b; font-weight: 900;">Set New Password</h2>
                    <p class="text-muted mb-4">Complete your account recovery</p>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label>New Password</label>
                            <div style="position: relative;">
                                <input class="form-control" type="password" name="new_password1" id="id_password1" placeholder="••••••••" required>
                                <span class="password-toggle" style="top:0;" onclick="togglePass('id_password1', this.querySelector('i'))">
                                    <i class="fa-solid fa-eye"></i>
                                </span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <div style="position: relative;">
                                <input class="form-control" type="password" name="new_password2" id="id_password2" placeholder="••••••••" required>
                                <span class="password-toggle" style="top:0;" onclick="togglePass('id_password2', this.querySelector('i'))">
                                    <i class="fa-solid fa-eye"></i>
                                </span>
                            </div>
                        </div>

                        <button class="btn-login" type="submit">UPDATE PASSWORD</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePass(inputId, icon) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>

</html>
